# .tmux.conf
# Johann Dahm
# Sources:
# - chrishunt/dot-files
# - technomancy/dotfiles

# Set correct TERM
set -g default-terminal "screen-256color"

# set scrollback history to 10k
set -g history-limit 10000

# start numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# re-number windows when one is closed
set -g renumber-windows on

# window mode-keys
setw -g mode-keys emacs
set -g status-keys emacs

# prefix key
unbind C-b
set -g prefix C-q
bind C-q send-prefix

# window titles
set -g set-titles on
set -w -g automatic-rename off
set -g set-titles-string "#T : #h > #S > #W"

# window splitting
unbind %
bind | split-window -h
unbind '"'
bind - split-window -v

# copy mode
bind ^[ copy-mode
bind Escape copy-mode

# paste mode
bind ] paste-buffer
bind ^] paste-buffer

# force a reload of the config file
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"


###########################
# Status Bar
###########################

# set refresh interval for status bar
set -g status-interval 30

# center the status bar
set -g status-justify left

# show session, window, pane in left status bar
set -g status-left-length 40

# # Status line
set -g window-status-format '#[fg=white,bold] #W '
set -g window-status-current-format '#[fg=green,bg=colour238,bold][ #W ]'
set -g status-left '#[fg=blue,bold]#I #[default]'
set -g status-right '#[default]'
# set-option -g status-right '#[fg=green]#H#[default] %m/%d/%y %I:%M\
#  #[fg=red]#(battery discharging)#[default]#(battery charging)'


###########################
# Colors
###########################

# color status bar
set -g status-bg colour235
set -g status-fg white

# highlight current window
set-window-option -g window-status-current-fg black
set-window-option -g window-status-current-bg green

# set color of active pane
set -g pane-border-fg colour235
set -g pane-border-bg black
set -g pane-active-border-fg green
set -g pane-active-border-bg black

# set scrollback history to 10k
set -g history-limit 10000

# C-b is not acceptable -- Vim uses it
# Use C-a like GNU screen
set-option -g prefix C-a
bind-key C-a last-window

# Set send-prefix
bind-key -n C-_ send-prefix

# Start numbering at 1
set -g base-index 1

# Rather than constraining window size to the maximum size of any client 
# connected to the *session*, constrain window size to the maximum size of any 
# client connected to *that window*. Much more reasonable.
setw -g aggressive-resize on

# Window mode-keys to use Vi bindings
set-window-option -g mode-keys vi

# Let mouse resize and select panes
set-window-option -g mode-mouse on
set-option -g mouse-select-pane on
set-option -g mouse-resize-pane on

# easy-to-remember split pane commands
bind-key | split-window -h
bind-key - split-window -v

# moving between panes with vim movement keys
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# moving between windows with vim movement keys
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# resize panes with vim movement keys
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

unbind-key [
bind-key Escape copy-mode
unbind-key p
bind-key p paste-buffer
bind -t vi-copy 'v' begin-selection
bind -t vi-copy 'y' copy-selection

# ----------------------
# set some pretty colors
# ----------------------
# set pane colors - hilight the active pane
set-option -g pane-border-fg colour235 #base02
set-option -g pane-active-border-fg colour240 #base01

# colorize messages in the command line
set-option -g message-bg black #base02
set-option -g message-fg brightred #orange

# ----------------------
# Status Bar
# -----------------------
set-option -g status on                # turn the status bar on
set -g status-justify centre           # center window list for clarity
# set-option -g status-position top    # position the status bar at top of screen
# set -g status-interval 5             # set update frequencey (default 15 seconds)

# set color for status bar
set-option -g status-bg colour235 #base02
set-option -g status-fg yellow #yellow
set-option -g status-attr dim 

# set window list colors - red for active and cyan for inactive
set-window-option -g window-status-fg brightblue #base0
set-window-option -g window-status-bg colour236 
set-window-option -g window-status-attr dim

set-window-option -g window-status-current-fg brightred #orange
set-window-option -g window-status-current-bg colour236 
set-window-option -g window-status-current-attr bright

set-option -g status on                # turn the status bar on
set -g status-justify centre           # center window list for clarity
# set-option -g status-position top    # position the status bar at top of screen

# show hist name on the left side of status bar
set -g status-left-length 20
set -g status-left "#[fg=green]#h "

# show session name and window & pane number on the right side of status bar
set -g status-right-length 42
set -g status-right "#[fg=yellow]#S #I:#P"

